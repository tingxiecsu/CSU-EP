batch_size: 550
epochs: 400
eval_every_n_epochs: 2
fine_tune_from: ""
log_every_n_steps: 2
learning_rate: 1e-05
gradient_accumulation_steps: 4
betas: (0.9, 0.98)
eps: 1e-06
weight_decay: 0.001
warmup_ratio: 0.05
stable_ratio: 0.6
min_lr_ratio: 1e-09
num_cycles: 0.5

model_config:
  vocab_size: 1505
  type_vocab_size: 1
  pad_token_id: 1503
  cls_token_id: 1502
  mask_token_id: 1504
  mlm_probability: 0.3
  attention_probs_dropout_prob: 0.1
  hidden_act: 'gelu'
  hidden_dropout_prob: 0.1
  hidden_size: 768
  initializer_range: 0.02
  intermediate_size: 3072
  layer_norm_eps: 1e-12
  num_attention_heads: 12
  num_hidden_layers: 6
  output_attentions: True
  add_cross_attention: False
  output_hidden_states: True
  use_return_dict: True
  
dataset:
  num_workers: 4
  valid_size: 0.2
  ms_file: "pretrain.mgf"

